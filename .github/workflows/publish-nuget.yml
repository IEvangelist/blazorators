name: publish nuget

# Publishes the Blazor.* packages to nuget.org using NuGet Trusted Publishing
# (OIDC). No long-lived API keys — the workflow exchanges a short-lived GitHub
# OIDC token for a temporary API key valid for 1 hour.
#
# nuget.org policy:
#   Repository Owner: IEvangelist
#   Repository:       blazorators
#   Workflow File:    publish-nuget.yml
#   Environment:      production

on:
  push:
    tags:
      - '**'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/setup-dotnet@main
        with:
          global-json-file: global.json

      - run: dotnet restore

      - run: dotnet build --configuration Release --no-restore -maxcpucount:1

      - run: dotnet pack --configuration Release --no-build

      - uses: NuGet/login@v1
        id: login
        with:
          user: dpine

      - run: |
          dotnet nuget push --skip-duplicate artifacts/package/release/*.nupkg \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
