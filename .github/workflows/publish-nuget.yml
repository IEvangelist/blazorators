name: publish nuget

on:
  push:
    tags:
      - '**'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for NuGet Trusted Publishing
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Build
        uses: ./.github/actions/build
        with:
          run-tests: 'false'
          pack: 'true'
          upload-artifacts: 'true'

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Diagnose token exchange (only on login failure)
        if: failure() && steps.login.outcome == 'failure'
        shell: bash
        env:
          NUGET_USER: ${{ secrets.NUGET_USER }}
        run: |
          set +e
          oidc_token=$(curl -sS \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://www.nuget.org" \
            | jq -r .value)
          echo "::add-mask::$oidc_token"
          echo "::group::OIDC claims that GitHub sent to nuget.org"
          printf '%s' "$oidc_token" | python3 -c "import sys, base64, json
          t = sys.stdin.read().strip().split('.')[1]
          t += '=' * (-len(t) % 4)
          claims = json.loads(base64.urlsafe_b64decode(t))
          keep = ['sub','aud','iss','repository','repository_owner','repository_id','workflow','workflow_ref','job_workflow_ref','ref','ref_type','event_name','environment','runner_environment']
          print(json.dumps({k: claims.get(k) for k in keep}, indent=2))"
          echo "::endgroup::"
          echo "::group::Raw nuget.org /api/v2/token response"
          body=$(printf '{"username":"%s","tokenType":"ApiKey"}' "${NUGET_USER}")
          curl -sS -i -X POST https://www.nuget.org/api/v2/token \
            -H "Authorization: Bearer $oidc_token" \
            -H "Content-Type: application/json" \
            -H "User-Agent: blazorators-debug" \
            -d "$body"
          echo
          echo "::endgroup::"
          echo "::notice title=Trusted publishing setup::Compare the OIDC claims above with the policy at https://www.nuget.org/account/trusted-publishing. Matches required: repository_owner=IEvangelist, repository=blazorators, workflow file (basename of job_workflow_ref)=publish-nuget.yml, and environment (must equal whatever you set in the policy, or be absent if the policy has none)."
          exit 0

      - name: Publish
        run: |
          dotnet nuget push --skip-duplicate artifacts/package/release/*.nupkg \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
