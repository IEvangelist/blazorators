<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Blazorators Demo</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="Blazor.ExampleConsumer.styles.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <link rel="mask-icon" href="safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#ffc40d">
    <meta name="theme-color" content="#ffffff">
</head>

<body>
    <a id="gitlink" target="_blank"
       href="https://github.com/IEvangelist/blazorators">
        <img style="position: absolute; top: 0; right: 0; border: 0; z-index: 1000"
             src="https://aral.github.io/fork-me-on-github-retina-ribbons/right-cerulean@2x.png"
             alt="Fork me on GitHub">
    </a>

    <div id="app">
        <div style="position: absolute; top: 30vh; width: 100%; text-align: center;">
            <div class="mud-text mud-typography-h4" style="margin-bottom: 16px;">
                🤖 Loading...
            </div>
            <div class="mud-progress-circular mud-progress-medium mud-progress-indeterminate mud-progress-circular-primary" style="margin: 16px auto;">
                <svg class="mud-progress-circular-svg" viewBox="22 22 44 44">
                    <circle class="mud-progress-circular-circle" cx="44" cy="44" r="20.2" fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-dasharray="126.920" stroke-dashoffset="126.920">
                        <animate attributeName="stroke-dasharray" dur="1.4s" values="0 126.920;63.460 63.460;0 126.920" repeatCount="indefinite"></animate>
                        <animate attributeName="stroke-dashoffset" dur="1.4s" values="0;-31.730;-126.920" repeatCount="indefinite"></animate>
                    </circle>
                </svg>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_content/Blazor.Geolocation.WebAssembly/blazorators.geolocation.g.js"></script>
    <script src="_content/Blazor.SpeechSynthesis.WebAssembly/blazorators.speechSynthesis.g.js"></script>
    <script type="text/javascript" src="https://www.bing.com/api/maps/mapcontrol?key=AuFFokbS0x6puH-xXz-ADH1ZcMnPC1JkdSyRidoWCGYpVYTlnivpswV0D-OtfxGb" async defer></script>
    <script src="app.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
